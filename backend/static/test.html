<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wispr Local Test</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-2: #0e9f6e;
        --border: #dce3ef;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top right, #d1fae5, var(--bg) 30%);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }
      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 4px;
      }
      button {
        cursor: pointer;
        font-weight: 600;
      }
      .primary {
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        border-color: transparent;
      }
      .danger {
        background: #fee2e2;
        color: #b91c1c;
      }
      textarea {
        margin-top: 12px;
        min-height: 160px;
        resize: vertical;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
        color: var(--muted);
      }
      @media (max-width: 700px) {
        .row,
        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Wispr Local - Test Micro</h1>
        <p>Enregistre depuis ton micro et envoie directement vers <code>/transcribe</code>.</p>

        <div class="grid">
          <div>
            <label for="apiKey">API key</label>
            <input id="apiKey" type="password" placeholder="WISPR_API_KEY" />
          </div>
          <div class="row">
            <div>
              <label for="language">Langue (optionnel)</label>
              <select id="language">
                <option value="">Auto</option>
                <option value="fr">fr</option>
                <option value="en">en</option>
                <option value="es">es</option>
                <option value="de">de</option>
              </select>
            </div>
            <div>
              <label for="micDevice">Micro</label>
              <select id="micDevice"></select>
            </div>
          </div>
          <div class="actions">
            <button id="startBtn" class="primary">Start Recording</button>
            <button id="stopBtn" class="danger" disabled>Stop + Transcribe</button>
          </div>
          <div class="status" id="status">Pret.</div>
          <textarea id="result" placeholder="Le texte transcrit apparaitra ici..."></textarea>
        </div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const apiKeyEl = document.getElementById("apiKey");
      const langEl = document.getElementById("language");
      const micEl = document.getElementById("micDevice");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");

      let mediaRecorder = null;
      let stream = null;
      let chunks = [];

      apiKeyEl.value = localStorage.getItem("wispr_api_key") || "";
      langEl.value = localStorage.getItem("wispr_lang") || "";

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function loadMics() {
        try {
          const temp = await navigator.mediaDevices.getUserMedia({ audio: true });
          temp.getTracks().forEach((t) => t.stop());

          const devices = await navigator.mediaDevices.enumerateDevices();
          const mics = devices.filter((d) => d.kind === "audioinput");
          micEl.innerHTML = "";
          mics.forEach((mic, i) => {
            const option = document.createElement("option");
            option.value = mic.deviceId;
            option.textContent = mic.label || `Microphone ${i + 1}`;
            micEl.appendChild(option);
          });
          if (!mics.length) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "Aucun micro detecte";
            micEl.appendChild(option);
          }
        } catch (err) {
          setStatus(`Erreur micro: ${err.message}`);
        }
      }

      function recorderMimeType() {
        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/mp4",
          "audio/ogg;codecs=opus",
        ];
        for (const c of candidates) {
          if (MediaRecorder.isTypeSupported(c)) return c;
        }
        return "";
      }

      async function startRecording() {
        try {
          const deviceId = micEl.value;
          stream = await navigator.mediaDevices.getUserMedia({
            audio: deviceId ? { deviceId: { exact: deviceId } } : true,
          });

          chunks = [];
          const mimeType = recorderMimeType();
          mediaRecorder = mimeType
            ? new MediaRecorder(stream, { mimeType })
            : new MediaRecorder(stream);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) chunks.push(event.data);
          };

          mediaRecorder.start();
          startBtn.disabled = true;
          stopBtn.disabled = false;
          setStatus("Enregistrement en cours...");
        } catch (err) {
          setStatus(`Erreur start: ${err.message}`);
        }
      }

      async function stopAndTranscribe() {
        if (!mediaRecorder) return;
        stopBtn.disabled = true;
        setStatus("Arret en cours...");

        await new Promise((resolve) => {
          mediaRecorder.onstop = resolve;
          mediaRecorder.stop();
        });

        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }

        startBtn.disabled = false;

        if (!chunks.length) {
          setStatus("Aucun audio capture.");
          return;
        }

        const apiKey = apiKeyEl.value.trim();
        const language = langEl.value.trim();
        localStorage.setItem("wispr_api_key", apiKey);
        localStorage.setItem("wispr_lang", language);

        const blobType = chunks[0]?.type || "audio/webm";
        const ext = blobType.includes("mp4") ? "m4a" : "webm";
        const audioBlob = new Blob(chunks, { type: blobType });
        const form = new FormData();
        form.append("file", audioBlob, `recording.${ext}`);

        const url = language
          ? `/transcribe?language=${encodeURIComponent(language)}`
          : "/transcribe";

        setStatus("Transcription en cours...");
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: apiKey ? { "X-API-Key": apiKey } : {},
            body: form,
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.detail || `HTTP ${response.status}`);
          }

          const text = payload.text || "";
          resultEl.value = text;
          setStatus(`OK - ${payload.elapsed_ms ?? "?"} ms`);
        } catch (err) {
          setStatus(`Erreur: ${err.message}`);
        }
      }

      startBtn.addEventListener("click", startRecording);
      stopBtn.addEventListener("click", stopAndTranscribe);
      loadMics();
    </script>
  </body>
</html>
